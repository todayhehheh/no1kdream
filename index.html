<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노원구 꿈드림 - 센터 키오스크</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/inko@1.1.1/inko.min.js"></script>

    <style>
        :root {
            --primary: #6C5CE7;
            --bg-body: #F4F7F6;
            --text-main: #2D3436;
            --shadow-card: 0 10px 20px rgba(0,0,0,0.06);
            --radius-card: 28px;
        }

        * { box-sizing: border-box; user-select: none; }

        body {
            margin: 0; padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-body);
            height: 100vh;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* 전체 컨테이너 */
        .kiosk-wrapper {
            width: 96%; height: 94vh;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.6);
            padding: 30px 50px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* 1. 헤더 영역 */
        .header {
            flex: 0 0 60px;
            display: flex; justify-content: space-between; align-items: center;
            position: relative;
        }
        .header-title {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-size: 34px; font-weight: 900; color: var(--text-main); margin: 0; letter-spacing: -1px;
        }
        .header-btn {
            padding: 10px 24px; border-radius: 50px; font-size: 16px; font-weight: 700;
            border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-tutorial { background: #FF7675; color: white; }
        .btn-tutorial:hover { transform: scale(1.05); background: #ff5252; }
        .btn-register { background: white; color: var(--primary); border: 2px solid var(--primary); }
        .btn-register:hover { transform: scale(1.05); background: var(--primary); color: white; }

        /* 2. 메인 그리드 레이아웃 (좌우 분할) */
        .main-grid {
            flex: 1;
            display: flex;
            gap: 30px;
            height: 100%;
            overflow: hidden;
        }

        /* [왼쪽 컬럼] 버튼(상) + 광고(하) */
        .left-column {
            flex: 1.8; /* 화면의 약 65% 차지 */
            display: flex; flex-direction: column; gap: 20px;
        }

        /* 왼쪽 상단: 기능 버튼 2개 (높이 28%로 축소) */
        .left-top {
            flex: 0 0 28%; 
            display: flex; gap: 25px;
        }
        .func-card {
            flex: 1; border-radius: var(--radius-card); border: none; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 800; color: white;
            box-shadow: var(--shadow-card); transition: transform 0.2s; gap: 10px;
        }
        .func-card .emoji { font-size: 48px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2)); }
        .func-card:hover { transform: translateY(-5px); filter: brightness(1.05); }
        .card-attendance { background: linear-gradient(135deg, #6C5CE7, #8e7bf5); }
        .card-snack { background: linear-gradient(135deg, #FF7675, #fab1a0); }

        /* 왼쪽 하단: 광고 3개 */
        .left-bottom {
            flex: 1; 
            display: flex; 
            gap: 20px;
            justify-content: center; 
            min-height: 0; 
        }
        
        .ad-wrapper {
            height: 100%; width: auto; 
            aspect-ratio: 4 / 5;
            border-radius: var(--radius-card);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            background: #eee;
            position: relative;
            transition: transform 0.3s;
            display: block; 
        }
        .ad-wrapper:hover { transform: translateY(-5px); z-index: 10; }
        
        .ad-img-tag {
            width: 100%; height: 100%;
            object-fit: cover; 
            display: block;
        }


        /* [오른쪽 컬럼] 급식 메뉴판 (5단 변경) */
        .right-column {
            flex: 1; /* 화면의 약 35% 차지 */
            background: white;
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            padding: 30px;
            display: flex; flex-direction: column;
        }
        .meal-title-row {
            display: flex; align-items: center; gap: 10px; margin-bottom: 15px; /* 여백 약간 줄임 */
        }
        .meal-icon-bg {
            background: #FF7675; color: white; width: 40px; height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .meal-title { font-size: 22px; font-weight: 800; color: var(--text-main); margin: 0; }

        .meal-list {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr; 
            grid-template-rows: repeat(5, 1fr); 
            gap: 12px; 
        }
        
        .meal-card-btn {
            background: white; border: 2px solid #F1F3F5;
            border-radius: 20px; cursor: pointer;
            display: flex; align-items: center; 
            padding: 0; overflow: hidden;
            transition: 0.2s;
            text-align: left;
        }
        .meal-card-btn:hover:not(:disabled) {
            border-color: var(--primary); box-shadow: 0 4px 15px rgba(108, 92, 231, 0.15); transform: translateX(5px);
        }
        .meal-card-btn:disabled { opacity: 0.6; cursor: not-allowed; background: #F8F9FA; }
        
        .meal-img-box {
            width: 100px; 
            height: 100%;
            background-color: #eee;
            background-size: cover; background-position: center;
            flex-shrink: 0; 
        }
        .meal-info {
            padding: 0 15px; 
            flex: 1;
        }
        .meal-name { font-size: 18px; font-weight: 800; color: #495057; display: block; margin-bottom: 2px; }
        .meal-desc { font-size: 12px; color: #868E96; font-weight: 500; }
        

        /* 유틸리티 */
        #loadingOverlay {
            display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.85); z-index: 10000;
            justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner {
            border: 5px solid #f3f3f3; border-top: 5px solid var(--primary);
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #blockScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f0f2f5; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: #333;
        }

        /* SweetAlert Custom */
        .swal-radio-group { display: flex; gap: 10px; margin: 15px 0 25px; }
        .swal-radio-item { flex: 1; }
        .swal-radio-item input { display: none; }
        .swal-radio-item label { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 90px; background: #f8f9fa; border-radius: 15px; 
            font-size: 14px; font-weight: 700; color: #636e72; cursor: pointer; 
            border: 2px solid transparent; transition: 0.2s; 
        }
        .swal-radio-item label span { font-size: 28px; margin-bottom: 5px; }
        .swal-radio-item input:checked + label { 
            background: #ede9fe; border-color: var(--primary); color: var(--primary); 
            box-shadow: 0 4px 10px rgba(108, 92, 231, 0.2);
        }
    </style>
</head>
<body>

    <div id="blockScreen">
        <h1 style="font-size: 80px; margin-bottom: 20px;">🔒</h1>
        <h2>접근이 제한된 기기입니다.</h2>
        <p style="color:#666; font-size:18px;">센터 관리자에게 기기 등록을 요청하세요.</p>
    </div>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p style="margin-top:20px; font-weight:bold; color:#555;">처리중입니다...</p>
    </div>

    <div class="kiosk-wrapper" id="mainContent" style="display:none;">
        
        <header class="header">
            <button onclick="openTutorialModal()" class="header-btn btn-tutorial">▶ 급식 튜토리얼</button>
            <h1 class="header-title">노원구 꿈드림</h1>
            <button onclick="openRegisterModal()" class="header-btn btn-register">🆕 회원가입</button>
        </header>

        <div class="main-grid">
            
            <div class="left-column">
                
                <div class="left-top">
                    <button class="func-card card-attendance" onclick="openCombinedModal('attendance')">
                        <span class="emoji">📅</span>
                        <span>출석하기</span>
                    </button>
                    <button class="func-card card-snack" onclick="openCombinedModal('snack')">
                        <span class="emoji">🥪</span>
                        <span>부식 신청</span>
                    </button>
                </div>

                <div class="left-bottom">
                    <a id="ad1Link" href="#" target="_blank" class="ad-wrapper">
                        <img id="ad1Img" class="ad-img-tag" alt="광고1" onerror="this.src='https://placehold.co/400x500?text=No+Image';">
                    </a>
                    <a id="ad2Link" href="#" target="_blank" class="ad-wrapper">
                        <img id="ad2Img" class="ad-img-tag" alt="광고2" onerror="this.src='https://placehold.co/400x500?text=No+Image';">
                    </a>
                    <a id="ad3Link" href="#" target="_blank" class="ad-wrapper">
                        <img id="ad3Img" class="ad-img-tag" alt="광고3" onerror="this.src='https://placehold.co/400x500?text=No+Image';">
                    </a>
                </div>
            </div>

            <div class="right-column">
                <div class="meal-title-row">
                    <div class="meal-icon-bg">🍚</div>
                    <h2 class="meal-title">오늘 뭐 먹지?</h2>
                </div>
                
                <div class="meal-list">
                    <button class="meal-card-btn" onclick="openCombinedModal('meal', '달인보쌈')">
                        <div class="meal-img-box" style="background-image: url('https://lh6.googleusercontent.com/proxy/fg-7Jv4MQ5BhHB_TKyR5FMtR7ml9_IArZWnH7NYgJgG2JfmPIUjUOHkERnJ9hMvscTsPLoOMauUHll4ZndknzFoREYeY9ipZwjCDkDo9-sZfX8V_jnk6PIqX9KG_8GFgUZxsuoh7TA');"></div>
                        <div class="meal-info">
                            <span class="meal-name">달인보쌈</span>
                            <span class="meal-desc">든든한 보쌈 정식 11:30~18:00(월휴무, 브레이크타임)</span>
                        </div>
                    </button>

                    <button class="meal-card-btn" onclick="openCombinedModal('meal', '미스테리분식')">
                        <div class="meal-img-box" style="background-image: url('https://cdn.e2news.com/news/photo/201511/85026_37781_5340.jpg');"></div>
                        <div class="meal-info">
                            <span class="meal-name">미스테리</span>
                            <span class="meal-desc">떡볶이와 튀김 10:30~18:00</span>
                        </div>
                    </button>

                    <button class="meal-card-btn" onclick="openCombinedModal('meal', '연김밥')">
                        <div class="meal-img-box" style="background-image: url('https://newsimg.sedaily.com/2025/01/14/2GNOXAIO35_1.jpg');"></div>
                        <div class="meal-info">
                            <span class="meal-name">연김밥</span>
                            <span class="meal-desc">신선한 재료 김밥 9:00~18:00(포장, 월휴무)</span>
                        </div>
                    </button>

                    <button class="meal-card-btn" onclick="openCombinedModal('meal', '동일로즉석떡볶이')">
                        <div class="meal-img-box" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQQI7NcXwWn8lSL6L0_OH1i0gCv-wLewsEHSg&s');"></div>
                        <div class="meal-info">
                            <span class="meal-name">동일로떡볶이</span>
                            <span class="meal-desc">즉석 떡볶이 맛집 11:00~18:00</span>
                        </div>
                    </button>

                    <button class="meal-card-btn" onclick="openCombinedModal('meal', '우리동네 첫끼')">
                        <div class="meal-img-box" style="background-image: url('https://image.8dogam.com/resized/product/asset/v1/upload/1df07dda12d14bc6bbbb2fdf80cd8803.jpeg?type=big&res=3x&ext=jpg');"></div>
                        <div class="meal-info">
                            <span class="meal-name">우리동네 첫끼</span>
                            <span class="meal-desc">샌드위치와 샐러드 9:00~18:00(포장)</span>
                        </div>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        // [수정] onSnapshot 추가 (실시간 감지용)
        import { db, collection, addDoc, query, where, getDocs, getDoc, doc, Timestamp, onSnapshot } from "./js/firebase-config.js";

        const inko = new Inko();

        const getTodayStr = () => {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        };

        const showLoading = (show) => {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        };

        const convertToDirectLink = (url) => {
            if (!url) return "";
            const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)\//);
            if (match && match[1]) {
                return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1000`;
            }
            return url;
        };

        // --- 광고 로드 (실시간 반영) ---
        const DEFAULT_ADS = {
            ad1: { image: "https://placehold.co/400x500?text=Dream+Center", link: "#" },
            ad2: { image: "https://placehold.co/400x500?text=Ad+Space+2", link: "#" },
            ad3: { image: "https://placehold.co/400x500?text=Ad+Space+3", link: "#" }
        };

        const applyAdsToScreen = (data) => {
            const setAd = (imgId, linkId, imgKey, linkKey, def) => {
                const imgEl = document.getElementById(imgId);
                const linkEl = document.getElementById(linkId);
                
                let rawUrl = data[imgKey];
                if(rawUrl && rawUrl.trim() !== "") {
                    imgEl.src = convertToDirectLink(rawUrl);
                } else {
                    imgEl.src = def.image;
                }
                
                if(data[linkKey]) linkEl.href = data[linkKey];
            };
            setAd('ad1Img', 'ad1Link', 'ad1_img', 'ad1_link', DEFAULT_ADS.ad1);
            setAd('ad2Img', 'ad2Link', 'ad2_img', 'ad2_link', DEFAULT_ADS.ad2);
            setAd('ad3Img', 'ad3Link', 'ad3_img', 'ad3_link', DEFAULT_ADS.ad3);
        };

        // [핵심] 실시간 광고 리스너 (캐싱 대신 사용)
        const startAdListener = () => {
            console.log("📡 광고 실시간 감지 시작...");
            onSnapshot(doc(db, "settings", "ads"), (docSnap) => {
                if (docSnap.exists()) {
                    console.log("🔔 광고 업데이트됨!");
                    applyAdsToScreen(docSnap.data());
                } else {
                    applyAdsToScreen({});
                }
            }, (error) => {
                console.error("광고 로드 실패:", error);
                applyAdsToScreen({});
            });
        };

        // --- 기기 인증 ---
        const checkDeviceAuth = () => {
            const isAuthorized = localStorage.getItem('kiosk_auth_token') === 'dream_center_pc';
            if (isAuthorized) {
                document.getElementById('blockScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'flex';
                
                // [변경] 한 번 불러오는 loadAds() 대신, 계속 감시하는 리스너 실행
                startAdListener();
            } else { console.log("미인증 기기"); }
        };

        // --- 튜토리얼 (이미지) ---
        window.openTutorialModal = () => {
            Swal.fire({
                title: '<strong>급식 튜토리얼</strong>',
                html: `<img src="./tutorial.png" style="width: 100%; height: auto; border-radius: 10px; display: block;" alt="급식 튜토리얼 이미지">`,
                showCloseButton: true, 
                showConfirmButton: false, 
                width: 700, 
                padding: '20px'
            });
        };

        // --- 한영 자동조립 함수 ---
        const autoConvertHanEng = (text) => {
            const eng = inko.ko2en(text); 
            return inko.en2ko(eng);       
        };

        // --- 회원가입 모달 ---
        window.openRegisterModal = async () => {
            const { value: formValues } = await Swal.fire({
                title: '회원가입',
                html: '<input id="swal-name" class="swal2-input" placeholder="이름 (예: 홍길동)">' +
                      '<input id="swal-birth" class="swal2-input" type="tel" maxlength="6" placeholder="생년월일 (예: 080101)">' +
                      '<input id="swal-pw" class="swal2-input" type="password" placeholder="비밀번호 설정">' +
                      '<input id="swal-pw2" class="swal2-input" type="password" placeholder="비밀번호 확인">',
                focusConfirm: false, showCancelButton: true, confirmButtonText: '가입하기',
                didOpen: () => {
                    const nameInput = document.getElementById('swal-name');
                    nameInput.addEventListener('input', function() {
                        const converted = autoConvertHanEng(this.value);
                        this.value = converted.replace(/[^가-힣ㄱ-ㅎㅏ-ㅣ]/g, '');
                    });
                },
                preConfirm: () => [
                    document.getElementById('swal-name').value,
                    document.getElementById('swal-birth').value,
                    document.getElementById('swal-pw').value,
                    document.getElementById('swal-pw2').value
                ]
            });

            if (formValues) {
                const [name, birth, pw, pw2] = formValues;
                if(!name || birth.length !== 6 || !pw) return Swal.fire('오류', '모든 정보를 입력해주세요.', 'error');
                if(pw !== pw2) return Swal.fire('오류', '비밀번호가 일치하지 않습니다.', 'error');
                showLoading(true);
                try {
                    const q = query(collection(db, "users"), where("name", "==", name), where("birth", "==", birth));
                    const snap = await getDocs(q);
                    if(!snap.empty) { showLoading(false); return Swal.fire('오류', '이미 가입된 회원입니다.', 'warning'); }
                    await addDoc(collection(db, "users"), { name, birth, password: pw, role: 'student', createdAt: Timestamp.now() });
                    showLoading(false); Swal.fire('성공', '회원가입이 완료되었습니다!', 'success');
                } catch(e) { showLoading(false); Swal.fire('오류', '시스템 오류', 'error'); }
            }
        };

        // --- 통합 신청 모달 ---
        window.openCombinedModal = async (type, targetName = "") => {
            let titleText = type === 'attendance' ? "출석 체크" : (type === 'meal' ? `[${targetName}] 식사 신청` : "부식 신청");
            const activityHtml = `
                <div style="text-align:center; font-size:15px; margin-bottom:10px; color:#666; font-weight:bold;">✨ 오늘의 활동을 선택해주세요</div>
                <div class="swal-radio-group">
                    <div class="swal-radio-item"><input type="radio" id="act1" name="activity" value="기초소양교육" checked><label for="act1"><span>📚</span>기초소양</label></div>
                    <div class="swal-radio-item"><input type="radio" id="act2" name="activity" value="프로그램"><label for="act2"><span>🎨</span>프로그램</label></div>
                    <div class="swal-radio-item"><input type="radio" id="act3" name="activity" value="스터디카페"><label for="act3"><span>✏️</span>스터디</label></div>
                </div>`;

            const { value: result } = await Swal.fire({
                title: titleText,
                html: activityHtml +
                      '<input id="loginId" class="swal2-input" placeholder="아이디 (이름+생년월일)" style="ime-mode:active;">' +
                      '<input id="loginPw" class="swal2-input" type="password" placeholder="비밀번호">',
                showCancelButton: true, confirmButtonText: '신청 완료', width: 600,
                didOpen: () => {
                    const idInput = document.getElementById('loginId');
                    idInput.addEventListener('input', function() {
                        const converted = autoConvertHanEng(this.value);
                        this.value = converted.replace(/[^가-힣ㄱ-ㅎㅏ-ㅣ0-9]/g, '');
                    });
                },
                preConfirm: () => {
                    const actInput = document.querySelector('input[name="activity"]:checked');
                    return { activity: actInput ? actInput.value : "기초소양교육", id: document.getElementById('loginId').value, pw: document.getElementById('loginPw').value }
                }
            });

            if (result) processApplication(type, targetName, result.activity, result.id, result.pw);
        };

        const processApplication = async (type, targetName, activity, rawId, pw) => {
            const cleanId = rawId.replace(/\s/g, '');
            const idMatch = cleanId.match(/^([가-힣a-zA-Z]+)(\d{6})$/);
            if(!idMatch) return Swal.fire('오류', '아이디는 이름+생년월일6자리 입니다.', 'warning');
            
            const name = idMatch[1]; const birth = idMatch[2];
            showLoading(true);

            try {
                const q = query(collection(db, "users"), where("name", "==", name), where("birth", "==", birth), where("password", "==", pw));
                const snapshot = await getDocs(q);
                if(snapshot.empty) { showLoading(false); return Swal.fire('인증 실패', '회원정보가 일치하지 않습니다.', 'error'); }

                const userDoc = snapshot.docs[0]; const userId = userDoc.id; const userData = userDoc.data(); const today = getTodayStr();
                let collectionName = "", dataPayload = { student_id: userId, student_name: userData.name, activity: activity, date: today, timestamp: Timestamp.now() }, successMsg = "";

                if(type === 'attendance') {
                    collectionName = "attendance"; successMsg = `${userData.name}님, [${activity}] 출석되셨습니다!`;
                } else if(type === 'meal') {
                    const checkQ = query(collection(db, "meal_applications"), where("student_id", "==", userId), where("date", "==", today));
                    const checkSnap = await getDocs(checkQ);
                    let isBlocked = false; checkSnap.forEach(doc => { if (doc.data().status === 'applied' || doc.data().status === 'approved') isBlocked = true; });
                    if(isBlocked) { showLoading(false); return Swal.fire('신청 불가', '이미 진행 중인 식사 신청이 있습니다.', 'warning'); }
                    
                    collectionName = "meal_applications"; 
                    dataPayload.store_name = targetName; 
                    dataPayload.status = "approved";
                    successMsg = `${userData.name}님, [${targetName}] 신청 승인되었습니다.`;
                
                } else if(type === 'snack') {
                    collectionName = "snacks"; dataPayload.item = "간식 세트"; successMsg = "맛있게 드세요!";
                }

                await addDoc(collection(db, collectionName), dataPayload);
                showLoading(false); Swal.fire('성공', successMsg, 'success');
            } catch(e) { showLoading(false); Swal.fire('시스템 오류', '오류가 발생했습니다.', 'error'); }
        };

        checkDeviceAuth();
    </script>
</body>
</html>
